version: '3.8'

services:
  haiguang-ops:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "18001:8000"
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET}
      - FEISHU_WEBHOOK_URL=${FEISHU_WEBHOOK_URL}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY:-}
      - FEISHU_OWNER_USER_IDS=${FEISHU_OWNER_USER_IDS:-}
      - FEISHU_BOT_USER_IDS=${FEISHU_BOT_USER_IDS:-}
      - FEISHU_USE_LONG_CONNECTION=${FEISHU_USE_LONG_CONNECTION:-false}
      - SKILL_TIMEOUT_MINUTES=10
      - MIN_CONFIDENCE_SCORE=${MIN_CONFIDENCE_SCORE:-0.45}
      - HIGH_CONFIDENCE_SCORE=${HIGH_CONFIDENCE_SCORE:-0.85}
      - BUSY_REPLY=${BUSY_REPLY:-收到，我现在有点忙，这个问题我稍后确认下再回复你。}
      - MESSAGE_QUEUE_DB_PATH=${MESSAGE_QUEUE_DB_PATH:-/app/data/message_queue.db}
      - AUDIT_LOG_PATH=${AUDIT_LOG_PATH:-/app/logs/audit.jsonl}
      - LOG_DIR=/app/logs
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN:-}
      - KNOWLEDGE_BASE_PATH=/app/skills/haiguang-ops/knowledge_base
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-20250514}
      - ANTHROPIC_MAX_TOKENS=${ANTHROPIC_MAX_TOKENS:-4096}
      - KNOWLEDGE_RETRIEVER_TYPE=${KNOWLEDGE_RETRIEVER_TYPE:-local}
      - RAGFLOW_API_URL=${RAGFLOW_API_URL:-}
      - RAGFLOW_API_TOKEN=${RAGFLOW_API_TOKEN:-}
      - RAGFLOW_OPS_DATASET_ID=${RAGFLOW_OPS_DATASET_ID:-}
      - RESOURCE_REQUEST_ENABLED=${RESOURCE_REQUEST_ENABLED:-false}
      - RESOURCE_POOLS_CONFIG_PATH=${RESOURCE_POOLS_CONFIG_PATH:-./config/resource_pools.yml}
      - RESOURCE_REQUEST_DB_PATH=${RESOURCE_REQUEST_DB_PATH:-/app/data/resource_requests.db}
      - PROMETHEUS_URL=${PROMETHEUS_URL:-}
      - PROMETHEUS_TIMEOUT_SECONDS=${PROMETHEUS_TIMEOUT_SECONDS:-5}
      - SSHUSER_GRANT_ENABLED=${SSHUSER_GRANT_ENABLED:-false}
      - SSHUSER_COMMAND_PATH=${SSHUSER_COMMAND_PATH:-/public/bin/sshuser}
      - SSHUSER_REMOTE_EXEC_ENABLED=${SSHUSER_REMOTE_EXEC_ENABLED:-false}
      - SSHUSER_JUMP_HOST=${SSHUSER_JUMP_HOST:-}
      - SSHUSER_JUMP_PORT=${SSHUSER_JUMP_PORT:-22}
      - SSHUSER_JUMP_USER=${SSHUSER_JUMP_USER:-resource_bot}
      - SSHUSER_SSH_KEY_PATH=${SSHUSER_SSH_KEY_PATH:-/app/secrets/resource_bot_id_rsa}
      - SSHUSER_KNOWN_HOSTS_PATH=${SSHUSER_KNOWN_HOSTS_PATH:-/app/secrets/known_hosts}
      - SSHUSER_TARGET_USER=${SSHUSER_TARGET_USER:-resource_exec}
      - SSHUSER_TARGET_SSH_PORT=${SSHUSER_TARGET_SSH_PORT:-22}
      - SSHUSER_CONNECT_TIMEOUT_SECONDS=${SSHUSER_CONNECT_TIMEOUT_SECONDS:-5}
      - SSHUSER_COMMAND_TIMEOUT_SECONDS=${SSHUSER_COMMAND_TIMEOUT_SECONDS:-15}
      - SSHUSER_MAX_RETRIES=${SSHUSER_MAX_RETRIES:-2}
      - SSHUSER_RETRY_BACKOFF_SECONDS=${SSHUSER_RETRY_BACKOFF_SECONDS:-3}
      - SSHUSER_MAX_PARALLEL_NODES=${SSHUSER_MAX_PARALLEL_NODES:-1}
      - SSHUSER_EXECUTOR_TYPE=${SSHUSER_EXECUTOR_TYPE:-jump_host}
      - RESOURCE_DEFAULT_GRANT_HOURS=${RESOURCE_DEFAULT_GRANT_HOURS:-24}
      - RESOURCE_MAX_GRANT_HOURS=${RESOURCE_MAX_GRANT_HOURS:-168}
      - RESOURCE_GRANT_CONFIRM_REQUIRED=${RESOURCE_GRANT_CONFIRM_REQUIRED:-true}
      - RESOURCE_EXPIRE_CHECK_INTERVAL_MINUTES=${RESOURCE_EXPIRE_CHECK_INTERVAL_MINUTES:-5}
      - RESOURCE_EXPIRE_REMIND_HOURS=${RESOURCE_EXPIRE_REMIND_HOURS:-2}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
